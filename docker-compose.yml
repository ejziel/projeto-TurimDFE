services:
  firebase-emulator:
    build:
      context: ./firebase
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
      - "8080:8080"
    volumes:
      - firebase-data:/opt/firebase/data
    environment:
      - FIRESTORE_PROJECT_ID=turimdfe-benchmark
      - JAVA_TOOL_OPTIONS=-Xmx4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - benchmark-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - FIRESTORE_EMULATOR_HOST=firebase-emulator:8080
      - FIREBASE_PROJECT_ID=turimdfe-benchmark
      - NODE_ENV=development
    depends_on:
      firebase-emulator:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npx ts-node-dev --respawn --transpile-only src/index.ts
    networks:
      - benchmark-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - benchmark-net

volumes:
  firebase-data:

networks:
  benchmark-net:
    driver: bridge
